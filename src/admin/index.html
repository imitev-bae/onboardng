{{define "content"}}
<section class="admin-dashboard" x-data="adminDashboard()" x-init="initData()" x-cloak>
    <div class="w3-container w3-padding-32" style="max-width:1200px; margin:0 auto;">

        <h2 class="form-title">Registers</h2>

        <!-- Error message -->
        <div x-show="message" :class="messageType === 'error' ? 'w3-panel w3-red' : 'w3-panel w3-green'">
            <p x-text="message"></p>
        </div>

        <div class="w3-margin-bottom" x-show="loading">Loading registrations...</div>

        <div class="w3-responsive" x-show="!loading">
            <table class="w3-table-all w3-hoverable w3-margin-top w3-border">
                <thead>
                    <tr class="dome-bgcolor">
                        <th>Date</th>
                        <th>Company</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <template x-for="reg in registrations" :key="reg.registration_id">
                    <tbody class="w3-border-bottom">
                        <!-- Main Registration Row -->
                        <tr @click="toggleExpansion(reg, 'details')" 
                            :class="{'w3-pale-red': getErrors(reg.registration_id).length > 0, 'w3-hover-light-grey': getErrors(reg.registration_id).length === 0, 'w3-hover-pale-red': getErrors(reg.registration_id).length > 0}" 
                            style="cursor: pointer;">
                            <td x-text="formatDate(reg.created_at)"></td>
                            <td x-text="reg.company_name + (reg.vat_id ? ' (' + reg.vat_id + ')' : '')"></td>
                            <td x-text="reg.email"></td>
                            <td>
                                <span class="w3-tag w3-small w3-round"
                                    :class="reg.notified ? 'w3-green' : 'w3-grey'">Notified</span>
                                <span class="w3-tag w3-small w3-round"
                                    :class="reg.issued ? 'w3-green' : 'w3-grey'">Issued</span>
                                <span class="w3-tag w3-small w3-round"
                                    :class="reg.tmf_registered ? 'w3-green' : 'w3-grey'">TMF</span>
                            </td>
                            <td>
                                <button class="w3-button w3-small w3-border w3-round w3-light-grey"
                                    @click.stop="toggleExpansion(reg, 'files')">Files</button>
                                <button class="w3-button w3-small w3-border w3-round"
                                    :class="getErrors(reg.registration_id).length > 0 ? 'w3-red w3-hover-red' : 'w3-light-grey'"
                                    @click.stop="toggleExpansion(reg, 'errors')">Errors</button>
                            </td>
                        </tr>

                        <!-- Details Expansion Row -->
                        <tr x-show="isExpanded(reg, 'details')" style="background-color: #fcfcfc;">
                            <td colspan="5" class="w3-padding-16">
                                <div class="w3-row">
                                    <div class="w3-half">
                                        <p><strong>Reg ID:</strong> <span x-text="reg.registration_id" style="font-family: monospace;"></span></p>
                                        <p><strong>First Name:</strong> <span x-text="reg.first_name"></span></p>
                                        <p><strong>Last Name:</strong> <span x-text="reg.last_name"></span></p>
                                        <p><strong>Email:</strong> <span x-text="reg.email"></span></p>
                                    </div>
                                    <div class="w3-half">
                                        <p><strong>Company Name:</strong> <span x-text="reg.company_name"></span></p>
                                        <p><strong>VAT ID:</strong> <span x-text="reg.vat_id"></span></p>
                                        <p><strong>Address:</strong> <span
                                                x-text="reg.street_address + ', ' + reg.postal_code + ' ' + reg.country"></span>
                                        </p>
                                    </div>
                                </div>
                            </td>
                        </tr>

                        <!-- Files Expansion Row -->
                        <tr x-show="isExpanded(reg, 'files')" style="background-color: #fcfcfc;">
                            <td colspan="5" class="w3-padding-16">
                                <div x-show="loadingSub === 'files'">Loading files...</div>
                                <div x-show="loadingSub !== 'files'">
                                    <template x-if="getFiles(reg.vat_id).length === 0">
                                        <p class="w3-text-grey w3-margin-0">No files uploaded.</p>
                                    </template>
                                    <ul class="w3-ul w3-border w3-white" x-show="getFiles(reg.vat_id).length > 0">
                                        <template x-for="file in getFiles(reg.vat_id)" :key="file.file_id">
                                            <li>
                                                <a :href="'/api/admin/file/' + file.file_id" target="_blank" @click.stop class="w3-text-blue w3-hover-text-indigo" style="text-decoration: none;">
                                                    <strong x-text="file.name"></strong>
                                                </a>
                                                <span class="w3-text-grey"
                                                    x-text="'(' + formatBytes(file.size) + ') '"></span>
                                                <span class="w3-tag w3-small w3-round w3-blue"
                                                    x-text="file.status"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </td>
                        </tr>

                        <!-- Errors Expansion Row -->
                        <tr x-show="isExpanded(reg, 'errors')" style="background-color: #fdf5f5;">
                            <td colspan="5" class="w3-padding-16">
                                <div x-show="loadingSub === 'errors'">Loading errors...</div>
                                <div x-show="loadingSub !== 'errors'">
                                    <template x-if="getErrors(reg.registration_id).length === 0">
                                        <p class="w3-text-grey w3-margin-0">No errors recorded.</p>
                                    </template>
                                    <ul class="w3-ul w3-border w3-white"
                                        x-show="getErrors(reg.registration_id).length > 0">
                                        <template x-for="err in getErrors(reg.registration_id)" :key="err.created_at">
                                            <li class="w3-text-red">
                                                <strong x-text="'[' + formatDate(err.created_at) + ']'"></strong>
                                                <span x-text="err.error"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </template>
            </table>
        </div>
    </div>
</section>

<script>
    function adminDashboard() {
        return {
            registrations: [],
            filesCache: {}, // mapped by vat_id
            errorsCache: {}, // mapped by registration_id
            expandedRow: null, // "id:type", e.g. "REG-123:files"
            loading: false,
            loadingSub: null,
            message: '',
            messageType: '',

            async initData() {
                // Fetch registrations first
                await this.fetchRegistrations();
                // Eagerly fetch errors so we can highlight rows immediately
                await this.fetchErrors();
            },

            async callApi(endpoint) {
                try {
                    const res = await fetch(endpoint, {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json'
                        }
                    });
                    const data = await res.json();
                    if (!data.success) {
                        throw new Error(data.message || 'API error');
                    }
                    return data;
                } catch (err) {
                    this.messageType = 'error';
                    this.message = 'Error communicating with server: ' + err.message;
                    return null;
                }
            },

            async fetchRegistrations() {
                this.loading = true;
                const data = await this.callApi('/api/admin/registrations?limit=1000');
                if (data && data.data) {
                    this.registrations = data.data;
                }
                this.loading = false;
            },

            async fetchFiles() {
                if (Object.keys(this.filesCache).length === 0) {
                    const data = await this.callApi('/api/admin/registration-files?limit=5000');
                    if (data && data.data) {
                        data.data.forEach(f => {
                            if (!this.filesCache[f.vat_id]) {
                                this.filesCache[f.vat_id] = [];
                            }
                            this.filesCache[f.vat_id].push(f);
                        });
                    }
                }
            },

            async fetchErrors() {
                if (Object.keys(this.errorsCache).length === 0) {
                    const data = await this.callApi('/api/admin/registration-errors?limit=5000');
                    if (data && data.data) {
                        data.data.forEach(e => {
                            if (!this.errorsCache[e.registration_id]) {
                                this.errorsCache[e.registration_id] = [];
                            }
                            this.errorsCache[e.registration_id].push(e);
                        });
                    }
                }
            },

            async toggleExpansion(reg, type) {
                const key = reg.registration_id + ':' + type;
                if (this.expandedRow === key) {
                    this.expandedRow = null;
                    return;
                }

                this.expandedRow = key;

                if (type === 'files') {
                    this.loadingSub = 'files';
                    await this.fetchFiles();
                    this.loadingSub = null;
                } else if (type === 'errors') {
                    this.loadingSub = 'errors';
                    await this.fetchErrors();
                    this.loadingSub = null;
                }
            },

            isExpanded(reg, type) {
                return this.expandedRow === reg.registration_id + ':' + type;
            },

            getFiles(vatId) {
                return this.filesCache[vatId] || [];
            },

            getErrors(regId) {
                return this.errorsCache[regId] || [];
            },

            formatDate(d) {
                if (!d) return '';
                const date = new Date(d);
                const yyyy = date.getFullYear();
                const mm = String(date.getMonth() + 1).padStart(2, '0');
                const dd = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const min = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd} ${hh}:${min}:${ss}`;
            },

            formatBytes(bytes, decimals = 2) {
                if (!+bytes) return '0 Bytes';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
            }
        }
    }
</script>
{{end}}
