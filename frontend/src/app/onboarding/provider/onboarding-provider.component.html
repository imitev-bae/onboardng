@if (currentStep >= 1 && currentStep <= 4) {
  <div class="absolute bottom-16 w-[420px] pointer-events-none select-none" style="left: calc(50% + 423px)">
    <div class="w-full watermark-logo" style="aspect-ratio: 1030/945"></div>
  </div>
}

@switch (currentStep) {
  @case (0) {
    <app-provider-landing
      [meetsRequirementsControl]="meetsRequirementsControl"
      (next)="goNext()">
    </app-provider-landing>
  }
  @case (1) {
    <app-terms
      [acceptTermsControl]="acceptTermsControl"
      termsLabel="DOME Terms and Conditions for Providers"
      termsUrl="https://onboard.dome.mycredential.eu/api/files/pbc_365946868/ki9zjz96v7re63n/20250303_dome_t_c_for_cloud_customers_6zqyb3yz7d.pdf"
      (next)="goNext()"
      (back)="goBack()">
    </app-terms>
  }
  @case (2) {
    <app-representative
      [formGroup]="representativeGroup"
      [isLoading]="isValidatingEmail"
      [errorMessage]="emailError"
      confirmText="I confirm I am authorised to manage this account on behalf of my organisation."
      (next)="validateEmailAndNext()"
      (back)="goBack()">
    </app-representative>
  }
  @case (3) {
    <app-email-verification
      [email]="representativeGroup.get('email')?.value"
      [isLoading]="isVerifyingCode"
      [errorMessage]="verifyError"
      (verify)="onVerify($event)"
      (resend)="onResendCode()">
    </app-email-verification>
  }
  @case (4) {
    <app-company-info
      [formGroup]="companyGroup"
      [isLoading]="isRegistering"
      [errorMessage]="registerError"
      (complete)="onComplete()"
      (back)="goBack()">
    </app-company-info>
  }
  @case (5) {
    <app-provider-success></app-provider-success>
  }
}
