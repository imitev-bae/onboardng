<div class="relative">
  @if (!isOpen) {
    <button
      type="button"
      class="w-full px-3 py-2.5 text-sm border rounded-lg bg-white flex items-center justify-between cursor-pointer"
      [ngClass]="hasError ? 'border-[#AD1F36]' : 'border-gray-300'"
      (click)="open()">
      @if (selectedCountry) {
        <span class="flex items-center gap-2">
          <img [src]="getFlagUrl(selectedCountry.code)" [alt]="selectedCountry.name" class="w-5 h-5 rounded-full object-cover" />
          {{ selectedCountry.name }}
        </span>
      } @else {
        <span class="text-gray-400"></span>
      }
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </button>
  } @else {
    <div class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-lg bg-white flex items-center gap-2 relative z-50">
      <input
        #searchInput
        type="text"
        [value]="searchText"
        (input)="searchText = $any($event.target).value"
        class="w-full bg-transparent outline-none ring-0 border-0 focus:ring-0 focus:outline-none text-sm p-0" />
      <svg class="w-4 h-4 text-gray-400 shrink-0 rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>
  }

  @if (isOpen) {
    <ul class="absolute z-50 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-lg max-h-[280px] overflow-y-auto">
      @for (country of filteredCountries; track country.code) {
        <li
          class="flex items-center gap-3 px-4 py-2.5 text-sm cursor-pointer hover:bg-[#DDE6F6]"
          [style.background-color]="country.code === value ? '#DDE6F6' : ''"
          (click)="select(country)">
          <img [src]="getFlagUrl(country.code)" [alt]="country.name" class="w-5 h-5 rounded-full object-cover" />
          <span>{{ country.name }}</span>
        </li>
      }
      @if (filteredCountries.length === 0) {
        <li class="px-4 py-3 text-sm text-gray-400">No results</li>
      }
    </ul>
  }
</div>
